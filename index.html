<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FleetCommand — Gestão de Frotas</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23185FA5'/><text y='72' x='50' text-anchor='middle' font-size='60'>🚛</text></svg>">
  <meta name="theme-color" content="#185FA5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FleetCommand">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    input, select, button { font-family: inherit; }
    input, select { padding: 6px 9px; border-radius: 7px; border: 1px solid #d0d0cc; font-size: 12px; background: #fff; color: #1a1a1a; width: 100%; }
    input:focus, select:focus { outline: 2px solid #185FA5; outline-offset: 1px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 8px; background: #f5f5f3; border-bottom: 1px solid #e0e0da; color: #666; font-size: 11px; font-weight: 500; white-space: nowrap; }
    td { padding: 8px; border-bottom: 1px solid #ebebea; vertical-align: middle; }
    td.edit-cell { padding: 4px; background: #eef4fb; }
    .btn { padding: 6px 13px; border-radius: 7px; cursor: pointer; font-size: 12px; border: 1px solid #d0d0cc; background: transparent; color: #1a1a1a; }
    .btn:hover { background: #f0f0ee; }
    .btn-primary { background: #185FA5; color: #fff; border-color: #185FA5; }
    .btn-save { background: #1D9E75; color: #fff; border-color: #1D9E75; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 500; }
    .card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 14px; }
    .metric { background: #f5f5f3; border-radius: 8px; padding: 0.8rem 1rem; }
    .metric-label { font-size: 11px; color: #666; margin-bottom: 3px; }
    .metric-value { font-size: 20px; font-weight: 500; }
    .grid-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .sec-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1D9E75; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999; display: none; }
    .toast.error { background: #E24B4A; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overflow-x { overflow-x: auto; }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;">
    <div class="spinner" style="width:28px;height:28px;border-color:#185FA5;border-top-color:transparent;"></div>
    <span style="color:#666;font-size:13px;">Conectando ao banco de dados...</span>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL = 'https://jrmocioibhnxfrjkoxnh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpybW9jaW9pYmhueGZyamtveG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjY1ODMsImV4cCI6MjA5MTk0MjU4M30.3tlIaNX2bmvSnzZYiWmLYrpfZ6WpBNauK_xFjAlN56k';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const CATEGORIAS = [
  { id: 'combustivel', label: 'Combustível', color: '#E24B4A', bg: '#FCEBEB' },
  { id: 'manutencao', label: 'Manutenção Frota', color: '#185FA5', bg: '#E6F1FB' },
  { id: 'lavagem', label: 'Lavagem', color: '#1D9E75', bg: '#E1F5EE' },
  { id: 'pneu_aquisicao', label: 'Pneus Aquisição', color: '#BA7517', bg: '#FAEEDA' },
  { id: 'pneu_servico', label: 'Pneus Serviços', color: '#533CB7', bg: '#EEEDFE' },
  { id: 'padronizacao', label: 'Padronização Frota', color: '#5F5E5A', bg: '#F1EFE8' },
];
const TIPOS = ['Caminhão','Van','Carro','Moto','Utilitário'];
const ALERT_TIPOS = ['IPVA','Seguro','Revisão','CNH','Licenciamento','Cronotacógrafo','ANTT','Despoluir','Laudo Plataforma','Alinhamento','Outros'];
let state = { veiculos:[], fornecedores:[], os:[], alertas:[], orcamentos:{}, tab:0, filtro:{de:'',ate:''}, mesSelecionado: new Date().toISOString().substring(0,7), filtroCategoria:'' };
let editState = { vId:null, vData:{}, fId:null, fData:{}, osId:null, osData:{}, aId:null, aData:{} };
function fmt(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pct(a,b){return b>0?Math.round((a/b)*100):0;}
function diasAte(data){const d=new Date(data+'T00:00:00'),h=new Date();h.setHours(0,0,0,0);return Math.ceil((d-h)/86400000);}
function stAlerta(data){const d=diasAte(data);if(d<0)return{label:'Vencido',color:'#E24B4A',bg:'#FCEBEB'};if(d<=30)return{label:d+'d',color:'#BA7517',bg:'#FAEEDA'};return{label:d+'d',color:'#1D9E75',bg:'#E1F5EE'};}
function badge(txt,color,bg){return `<span class="badge" style="color:${color};background:${bg}">${txt}</span>`;}
function nomeMes(m){const[y,mo]=m.split('-');return new Date(y,mo-1,1).toLocaleString('pt-BR',{month:'long',year:'numeric'});}
function mesDeData(d){return d?d.substring(0,7):null;}
function showToast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' error':'');t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
async function loadAll(){
  const[v,f,o,a,orc]=await Promise.all([
    sb.from('veiculos').select('*').order('criado_em'),
    sb.from('fornecedores').select('*').order('criado_em'),
    sb.from('ordens_servico').select('*').order('criado_em'),
    sb.from('alertas').select('*').order('vencimento'),
    sb.from('orcamentos').select('*').eq('mes_ano',state.mesSelecionado),
  ]);
  state.veiculos=v.data||[];state.fornecedores=f.data||[];state.os=o.data||[];state.alertas=a.data||[];
  state.orcamentos={};(orc.data||[]).forEach(x=>state.orcamentos[x.categoria]=x.valor);
  render();
}
function mesReferenciaOS(o){
  // OS fechada: usa data_fechamento, se não tiver usa data_abertura
  if(o.status==='Fechada') return mesDeData(o.data_fechamento)||mesDeData(o.data_abertura)||state.mesSelecionado;
  return null;
}
function osDoMes(){return state.os.filter(o=>o.status==='Fechada'&&mesReferenciaOS(o)===state.mesSelecionado);}
function osAbertasDoMes(){return state.os.filter(o=>o.status==='Aberta'&&(mesDeData(o.data_abertura)||state.mesSelecionado)<=state.mesSelecionado);}
function osDoMesFilt(){return state.filtroCategoria?osDoMes().filter(o=>o.categoria===state.filtroCategoria):osDoMes();}
function osAbertasFilt(){return state.filtroCategoria?osAbertasDoMes().filter(o=>o.categoria===state.filtroCategoria):osAbertasDoMes();}
function gastosCat(){const g={};CATEGORIAS.forEach(c=>g[c.id]=0);osDoMesFilt().forEach(o=>{if(g[o.categoria]!==undefined)g[o.categoria]+=Number(o.valor);});return g;}
function previstoCat(){const g={};CATEGORIAS.forEach(c=>g[c.id]=0);osAbertasFilt().forEach(o=>{if(g[o.categoria]!==undefined)g[o.categoria]+=Number(o.valor);});return g;}
function gastosV(){const g={};state.veiculos.forEach(v=>g[v.id]=0);osDoMesFilt().forEach(o=>{if(g[o.veiculo_id]!==undefined)g[o.veiculo_id]+=Number(o.valor);});return g;}
function previstosV(){const g={};state.veiculos.forEach(v=>g[v.id]=0);osAbertasFilt().forEach(o=>{if(g[o.veiculo_id]!==undefined)g[o.veiculo_id]+=Number(o.valor);});return g;}
function gastosF(){const g={};state.fornecedores.forEach(f=>g[f.id]=0);osDoMesFilt().forEach(o=>{if(g[o.fornecedor_id]!==undefined)g[o.fornecedor_id]+=Number(o.valor);});return g;}
function previstosF(){const g={};state.fornecedores.forEach(f=>g[f.id]=0);osAbertasFilt().forEach(o=>{if(g[o.fornecedor_id]!==undefined)g[o.fornecedor_id]+=Number(o.valor);});return g;}
function totalGasto(){return Object.values(gastosCat()).reduce((a,b)=>a+b,0);}
function totalPrevisto(){return Object.values(previstoCat()).reduce((a,b)=>a+b,0);}
function orcFiltrado(){return state.filtroCategoria?{[state.filtroCategoria]:state.orcamentos[state.filtroCategoria]||0}:state.orcamentos;}
function totalOrc(){return Object.values(orcFiltrado()).reduce((a,b)=>a+Number(b),0);}
function pbar(real,prev,orc,color){
  const pReal=Math.min(pct(real,orc),100),pPrev=Math.min(pct(prev,orc),100-pReal);
  const c=pct(real+prev,orc)>100?'#E24B4A':pct(real+prev,orc)>80?'#BA7517':color;
  return `<div style="height:10px;border-radius:4px;background:#ebebea;overflow:hidden;position:relative;margin:3px 0 2px">
    <div style="position:absolute;height:100%;width:${pReal}%;background:${c};z-index:2"></div>
    <div style="position:absolute;height:100%;left:${pReal}%;width:${pPrev}%;background:${c}55;z-index:1"></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:#888">
    <span><b style="color:#E24B4A">${fmt(real)}</b>${prev>0?` + <span style="color:#BA7517">${fmt(prev)} prev.</span>`:''}</span>
    <span style="color:${real+prev>orc?'#E24B4A':'inherit'}">${pct(real+prev,orc)}% de ${fmt(orc)}</span>
  </div>`;}
async function salvarVeiculo(){
  const d={...editState.vData,km:parseInt(editState.vData.km)||0,ano:parseInt(editState.vData.ano)||2024};
  if(editState.vId==='new'){delete d.id;const{error}=await sb.from('veiculos').insert(d);if(error)return showToast('Erro: '+error.message,true);}
  else{const{error}=await sb.from('veiculos').update(d).eq('id',editState.vId);if(error)return showToast('Erro: '+error.message,true);}
  editState.vId=null;showToast('Veículo salvo!');await loadAll();
}
async function salvarForn(){
  const d={...editState.fData};
  if(editState.fId==='new'){delete d.id;const{error}=await sb.from('fornecedores').insert(d);if(error)return showToast('Erro: '+error.message,true);}
  else{const{error}=await sb.from('fornecedores').update(d).eq('id',editState.fId);if(error)return showToast('Erro: '+error.message,true);}
  editState.fId=null;showToast('Fornecedor salvo!');await loadAll();
}
async function salvarOS(){
  const d={...editState.osData,valor:parseFloat(editState.osData.valor)||0};
  d.data_fechamento=d.data_fechamento&&d.data_fechamento.trim()!==''?d.data_fechamento:null;
  d.data_abertura=d.data_abertura&&d.data_abertura.trim()!==''?d.data_abertura:null;
  if(!d.veiculo_id)return showToast('Selecione um veículo',true);
  if(!d.fornecedor_id)return showToast('Selecione um fornecedor',true);
  if(editState.osId==='new'){delete d.id;const{error}=await sb.from('ordens_servico').insert(d);if(error)return showToast('Erro OS: '+error.message,true);}
  else{const{error}=await sb.from('ordens_servico').update(d).eq('id',editState.osId);if(error)return showToast('Erro OS: '+error.message,true);}
  editState.osId=null;showToast('OS salva!');await loadAll();
}
async function salvarAlerta(){
  const d={...editState.aData};delete d.id;
  if(!d.veiculo_id||!d.vencimento)return showToast('Preencha veículo e vencimento',true);
  const{error}=await sb.from('alertas').insert(d);
  if(error)return showToast('Erro: '+error.message,true);
  editState.aId=null;showToast('Alerta salvo!');await loadAll();
}
async function removerAlerta(id){await sb.from('alertas').delete().eq('id',id);showToast('Removido');await loadAll();}
async function salvarOrcamento(cat,val){
  const valor=parseFloat(val)||0;
  const{error}=await sb.from('orcamentos').upsert({categoria:cat,mes_ano:state.mesSelecionado,valor,atualizado_em:new Date().toISOString()},{onConflict:'categoria,mes_ano'});
  if(error)return showToast('Erro orçamento: '+error.message,true);
  state.orcamentos[cat]=valor;render();showToast('Orçamento salvo!');
}
function render(){
  const tabs=[{label:'Painel Geral',icon:'▦'},{label:'Veículos',icon:'🚛'},{label:'Ordens de Serviço',icon:'📋'},{label:'Fornecedores',icon:'🏭'},{label:'Alertas',icon:'🔔'},{label:'Orçamento',icon:'💰'}];
  const tabBtns=tabs.map((t,i)=>`<button onclick="setTab(${i})" style="display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:${state.tab===i?500:400};background:${state.tab===i?'#185FA5':'transparent'};color:${state.tab===i?'#fff':'#888'}">${t.icon} ${t.label}</button>`).join('');
  const gc=gastosCat(),pc=previstoCat(),gv=gastosV(),pv=previstosV(),gf=gastosF(),pf=previstosF();
  const tg=totalGasto(),tp=totalPrevisto(),to=totalOrc();
  const catsBtns=`<button onclick="setCategoria('')" style="padding:5px 11px;border-radius:7px;cursor:pointer;font-size:12px;border:${state.filtroCategoria===''?'none':'0.5px solid #d0d0cc'};background:${state.filtroCategoria===''?'#185FA5':'transparent'};color:${state.filtroCategoria===''?'#fff':'#1a1a1a'}">Todos</button>`+
    CATEGORIAS.map(cat=>`<button onclick="setCategoria('${cat.id}')" style="display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;cursor:pointer;font-size:12px;border:${state.filtroCategoria===cat.id?'none':'0.5px solid #d0d0cc'};background:${state.filtroCategoria===cat.id?cat.color:'transparent'};color:${state.filtroCategoria===cat.id?'#fff':'#1a1a1a'}"><span style="width:8px;height:8px;border-radius:2px;background:${state.filtroCategoria===cat.id?'#fff':cat.color}"></span>${cat.label}</button>`).join('');
  const filtroBar=`<div class="card" style="padding:0.8rem 1.25rem;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:500;color:#666">📅 Mês:</span>
      <input type="month" value="${state.mesSelecionado}" onchange="setMes(this.value)" style="width:150px;font-weight:500;color:#185FA5;border-color:#185FA5;padding:5px 8px;border-radius:6px;border:1px solid #185FA5;font-size:12px">
      <span style="font-size:12px;font-weight:500;color:#185FA5;text-transform:capitalize">${nomeMes(state.mesSelecionado)}</span>
    </div>
    ${state.tab===0?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ebebea">
      <span style="font-size:12px;font-weight:500;color:#666">📊 Categoria:</span>
      ${catsBtns}
      <span style="margin-left:auto;font-size:11px;color:#888">${osDoMesFilt().length} fechadas · <span style="color:#BA7517">${osAbertasFilt().length} previstas</span></span>
    </div>`:''}
  </div>`;
  let content='';
  if(state.tab===0)content=renderDashboard(gc,pc,gv,pv,gf,pf,tg,tp,to);
  else if(state.tab===1)content=renderVeiculos();
  else if(state.tab===2)content=renderOS();
  else if(state.tab===3)content=renderFornecedores(gf,pf,tg);
  else if(state.tab===4)content=renderAlertas();
  else if(state.tab===5)content=renderOrcamento(gc,pc,tg,tp,to);
  document.getElementById('app').innerHTML=`
    <div style="background:#fff;border-bottom:1px solid #e8e8e4;padding:0 1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:10px;padding:0.85rem 0">
        <div style="width:36px;height:36px;border-radius:10px;background:#185FA5;display:flex;align-items:center;justify-content:center;font-size:18px">🚛</div>
        <div><div style="font-weight:600;font-size:15px">FleetCommand</div><div style="font-size:10px;color:#888;letter-spacing:0.5px;text-transform:uppercase">Gestão de Frotas</div></div>
      </div>
      <div style="display:flex;gap:2px;flex-wrap:wrap;padding:0.5rem 0">${tabBtns}</div>
    </div>
    <div style="padding:1.25rem;max-width:1100px;margin:0 auto">${filtroBar}${content}</div>`;
}
function renderDashboard(gc,pc,gv,pv,gf,pf,tg,tp,to){
  const catsExibir=state.filtroCategoria?CATEGORIAS.filter(c=>c.id===state.filtroCategoria):CATEGORIAS;
  const veicSorted=[...state.veiculos].sort((a,b)=>((gv[b.id]||0)+(pv[b.id]||0))-((gv[a.id]||0)+(pv[a.id]||0)));
  const fornSorted=[...state.fornecedores].sort((a,b)=>((gf[b.id]||0)+(pf[b.id]||0))-((gf[a.id]||0)+(pf[a.id]||0)));
  const osList=[...osDoMesFilt()].sort((a,b)=>b.valor-a.valor).slice(0,6);
  return `
  ${state.filtroCategoria?`<div class="card" style="background:${CATEGORIAS.find(c=>c.id===state.filtroCategoria)?.bg};border-color:${CATEGORIAS.find(c=>c.id===state.filtroCategoria)?.color}60;padding:0.7rem 1.25rem;display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <span style="width:10px;height:10px;border-radius:2px;background:${CATEGORIAS.find(c=>c.id===state.filtroCategoria)?.color}"></span>
    <span style="font-size:13px;font-weight:500;color:${CATEGORIAS.find(c=>c.id===state.filtroCategoria)?.color}">Filtrando: ${CATEGORIAS.find(c=>c.id===state.filtroCategoria)?.label}</span>
    <button class="btn" onclick="setCategoria('')" style="margin-left:auto;font-size:11px">✕ Ver todos</button>
  </div>`:''}
  <div class="grid-metrics">
    ${[{l:'Total gasto',v:fmt(tg),c:'#E24B4A'},{l:'Orçamento total',v:fmt(to),c:'#185FA5'},{l:'Saldo disponível',v:fmt(to-tg),c:to-tg>=0?'#1D9E75':'#E24B4A'},{l:'OS abertas',v:osAbertasFilt().length,c:'#BA7517'},{l:'Frota',v:state.veiculos.length+' veículos',c:'#1a1a1a'}]
      .map(x=>`<div class="metric"><div class="metric-label">${x.l}</div><div class="metric-value" style="color:${x.c}">${x.v}</div></div>`).join('')}
  </div>
  <div class="grid-2">
    <div class="card"><div class="sec-title">Orçamento por categoria</div>
      ${catsExibir.map(cat=>`<div style="margin-bottom:13px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
          <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:${cat.color};display:inline-block"></span>${cat.label}</span>
        </div>
        ${pbar(gc[cat.id]||0,pc[cat.id]||0,Number(state.orcamentos[cat.id]||0),cat.color)}
      </div>`).join('')}
      <div style="display:flex;gap:12px;font-size:10px;color:#888;margin-top:8px">
        <span><span style="display:inline-block;width:10px;height:10px;background:#185FA5;border-radius:2px;margin-right:3px"></span>Realizado</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#185FA555;border-radius:2px;margin-right:3px"></span>Previsto</span>
      </div>
    </div>
    <div class="card"><div class="sec-title">Impacto por veículo</div>
      ${veicSorted.map((v,i)=>{const real=gv[v.id]||0,prev=pv[v.id]||0,total=tg+tp||1;return`<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:1px">
          <span><b style="color:${i===0?'#E24B4A':'#888'}">#${i+1}</b> ${v.placa} — ${v.modelo}</span>
          <span><b style="color:#E24B4A">${fmt(real)}</b>${prev>0?`<span style="color:#BA7517;font-size:11px"> +${fmt(prev)}</span>`:''}</span>
        </div>
        <div style="height:7px;border-radius:4px;background:#ebebea;overflow:hidden;position:relative">
          <div style="position:absolute;height:100%;width:${pct(real,total)}%;background:${i===0?'#E24B4A':'#185FA5'};border-radius:4px"></div>
          ${prev>0?`<div style="position:absolute;height:100%;left:${pct(real,total)}%;width:${pct(prev,total)}%;background:${i===0?'#E24B4A55':'#185FA555'}"></div>`:''}
        </div>
      </div>`;}).join('')}
    </div>
  </div>

function renderVeiculos(){

          <td><b>${v.placa}</b></td><td>${v.modelo}</td><td>${v.ano}</td>
          <td>${Number(v.km).toLocaleString('pt-BR')} km</td><td>${v.responsavel||'—'}</td>

function renderOS(){
  const fechadas=[...state.os.filter(o=>o.status==='Fechada')].sort((a,b)=>b.valor-a.valor);
  const abertas=[...state.os.filter(o=>o.status==='Aberta')].sort((a,b)=>b.valor-a.valor);
  const sorted=[...fechadas,...abertas];
  const d=editState.osData;
  const veicOpts=`<option value="">-- Veículo --</option>`+state.veiculos.map(v=>`<option value="${v.id}"${v.id===d.veiculo_id?' selected':''}>${v.placa}</option>`).join('')+`<optgroup label="─────"><option value="oficina"${d.veiculo_id==='oficina'?' selected':''}>🔧 Oficina</option><option value="estoque"${d.veiculo_id==='estoque'?' selected':''}>📦 Estoque</option></optgroup>`;
  const fornOpts=`<option value="">-- Fornecedor --</option>`+state.fornecedores.map(f=>`<option value="${f.id}"${f.id===d.fornecedor_id?' selected':''}>${f.nome}</option>`).join('');
  const catOpts=CATEGORIAS.map(c=>`<option value="${c.id}"${c.id===d.categoria?' selected':''}>${c.label}</option>`).join('');
  const mesRefOpts=()=>{
    const opts=[`<option value="">-- Mês --</option>`];
    const hoje=new Date();
    for(let i=-3;i<=6;i++){
      const d2=new Date(hoje.getFullYear(),hoje.getMonth()+i,1);
      const val=d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0');
      const lbl=d2.toLocaleString('pt-BR',{month:'long',year:'numeric'});
      opts.push(`<option value="${val}"${val===d.mes_referencia?' selected':''}>${lbl}</option>`);
    }
    return opts.join('');
  };
  const editRow=`<tr style="background:#eef4fb">
    <td class="edit-cell"><input autocomplete="off" value="${d.numero||''}" oninput="updEdit('os','numero',this.value)" style="width:105px"></td>
    <td class="edit-cell"><select onchange="updEdit('os','veiculo_id',this.value)" style="width:105px">${veicOpts}</select></td>
    <td class="edit-cell"><select onchange="updEdit('os','categoria',this.value)" style="width:115px">${catOpts}</select></td>
    <td class="edit-cell"><input autocomplete="off" value="${d.descricao||''}" oninput="updEdit('os','descricao',this.value)" placeholder="Descrição" style="width:130px"></td>
    <td class="edit-cell"><select onchange="updEdit('os','fornecedor_id',this.value)" style="width:115px">${fornOpts}</select></td>
    <td class="edit-cell"><input autocomplete="off" value="${d.nf||''}" oninput="updEdit('os','nf',this.value)" placeholder="NF" style="width:85px"></td>
    <td class="edit-cell"><input autocomplete="off" value="${d.conta_orcamentaria||''}" oninput="updEdit('os','conta_orcamentaria',this.value)" placeholder="Conta" style="width:85px"></td>
    <td class="edit-cell"><input type="date" value="${d.data_abertura||''}" onchange="updEdit('os','data_abertura',this.value)" style="width:108px"></td>
    <td class="edit-cell"><input type="date" value="${d.data_fechamento||''}" onchange="updEdit('os','data_fechamento',this.value)" style="width:108px"></td>
    <td class="edit-cell"><select onchange="updEdit('os','status',this.value)" style="width:82px"><option${d.status==='Aberta'?' selected':''}>Aberta</option><option${d.status==='Fechada'?' selected':''}>Fechada</option></select></td>
    <td class="edit-cell" style="background:${d.status==='Fechada'?'#E1F5EE':'#eef4fb'}">
      <select onchange="updEdit('os','mes_referencia',this.value)" style="width:130px;border-color:${d.status==='Fechada'?'#1D9E75':'#d0d0cc'}">${mesRefOpts()}</select>
      ${d.status==='Fechada'&&!d.mes_referencia?'<div style="font-size:9px;color:#E24B4A">Selecione o mês!</div>':''}
    </td>
    <td class="edit-cell"><input type="number" value="${d.valor||''}" oninput="updEdit('os','valor',this.value)" placeholder="Valor" style="width:85px"></td>
    <td class="edit-cell"><button class="btn btn-save" onclick="salvarOS()">Salvar</button> <button class="btn" onclick="cancelEdit('os')">✕</button></td>
  </tr>`;
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div><div class="sec-title" style="margin-bottom:2px">Ordens de Serviço — ${state.os.length} registros</div>
      <div style="font-size:11px;color:#888">${fechadas.length} fechadas · <span style="color:#BA7517">${abertas.length} abertas (previsto)</span></div></div>
      <button class="btn btn-primary" onclick="novaOS()">+ Nova OS</button>
    </div>
    <div class="overflow-x"><table>
      <thead><tr><th>Nº OS</th><th>Veículo</th><th>Categoria</th><th>Descrição</th><th>Fornecedor</th><th>NF</th><th>Conta Orc.</th><th>Abertura</th><th>Fechamento</th><th>Status</th><th style="background:#E1F5EE;color:#1D9E75">Mês Ref.</th><th>Valor</th><th></th></tr></thead>
      <tbody>
        ${editState.osId==='new'?editRow:''}
        ${sorted.map(o=>{
          const veicLabel=o.veiculo_id==='oficina'?'🔧 Oficina':o.veiculo_id==='estoque'?'📦 Estoque':(state.veiculos.find(x=>x.id===o.veiculo_id)?.placa||'—');
          const f=state.fornecedores.find(x=>x.id===o.fornecedor_id);
          const cat=CATEGORIAS.find(c=>c.id===o.categoria);
          const ab=o.status==='Aberta';
          const mesRef=o.mes_referencia?nomeMes(o.mes_referencia):'—';
          return editState.osId===o.id?editRow:`<tr style="background:${ab?'#FFFBF0':'transparent'}">
            <td>${badge(o.numero,'#533CB7','#EEEDFE')}</td>
            <td>${veicLabel}</td>
            <td>${badge(cat.label,cat.color,cat.bg)}</td>
            <td>${o.descricao||''}</td><td>${f?.nome||'—'}</td>
            <td>${o.nf||''}</td><td>${o.conta_orcamentaria||''}</td>
            <td>${o.data_abertura||''}</td><td>${o.data_fechamento||'—'}</td>
            <td>${badge(o.status,ab?'#BA7517':'#1D9E75',ab?'#FAEEDA':'#E1F5EE')}</td>
            <td style="background:${!ab&&o.mes_referencia?'#E1F5EE':!ab&&!o.mes_referencia?'#FCEBEB':'transparent'};font-size:11px">
              ${ab?'<span style="color:#888">previsto</span>':o.mes_referencia?`<b style="color:#1D9E75">${mesRef}</b>`:'<span style="color:#E24B4A">⚠️ sem mês</span>'}
            </td>
            <td><b style="color:${ab?'#BA7517':'#1a1a1a'}">${fmt(o.valor)}</b>${ab?`<div style="font-size:9px;color:#BA7517">previsto</div>`:''}</td>
            <td><button class="btn" onclick="editOS('${o.id}')">Editar</button></td>
          </tr>`;}).join('')}
      </tbody>
    </table></div>
  </div>`;}
function renderFornecedores(gf,pf,tg){
  const sorted=[...state.fornecedores].sort((a,b)=>((gf[b.id]||0)+(pf[b.id]||0))-((gf[a.id]||0)+(pf[a.id]||0)));
  const d=editState.fData;

  const editRow=`<tr style="background:#eef4fb">
    <td class="edit-cell">novo</td>
    <td class="edit-cell"><input autocomplete="off" value="${d.nome||''}" oninput="updEdit('f','nome',this.value)" placeholder="Nome"></td>

  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="sec-title">Fornecedores — maior → menor impacto</div>
      <button class="btn btn-primary" onclick="novoForn()">+ Novo fornecedor</button>
    </div>
    <div class="overflow-x"><table>
      <thead><tr><th>#</th><th>Nome</th><th>CNPJ</th><th>Contato</th><th>Categoria</th><th>Realizado</th><th>Previsto</th><th></th></tr></thead>
      <tbody>
        ${editState.fId==='new'?editRow:''}
        ${sorted.map((f,i)=>{const cat=CATEGORIAS.find(c=>c.id===f.categoria);return editState.fId===f.id?editRow.replace('novo',i+1):`<tr>
          <td><b style="color:${i===0?'#E24B4A':'#888'}">${i+1}</b></td>
          <td><b>${f.nome}</b></td><td>${f.cnpj||''}</td><td>${f.contato||''}</td>
          <td>${badge(cat.label,cat.color,cat.bg)}</td>
          <td><b style="color:#E24B4A">${fmt(gf[f.id]||0)}</b></td>
          <td style="color:#BA7517">${fmt(pf[f.id]||0)}</td>
          <td><button class="btn" onclick="editForn('${f.id}')">Editar</button></td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>
  </div>`;}
function renderAlertas(){
  const d=editState.aData;
  const veicOpts=state.veiculos.map(v=>`<option value="${v.id}"${v.id==d.veiculo_id?' selected':''}>${v.placa} — ${v.modelo}</option>`).join('');
  const editRow=`<tr style="background:#eef4fb">
    <td class="edit-cell"><select oninput="updEdit('a','veiculo_id',this.value)">${veicOpts}</select></td>
    <td class="edit-cell"><select oninput="updEdit('a','tipo',this.value)">${ALERT_TIPOS.map(t=>`<option${t===d.tipo?' selected':''}>${t}</option>`).join('')}</select></td>
    <td class="edit-cell"><input type="date" value="${d.vencimento||''}" oninput="updEdit('a','vencimento',this.value)"></td>
    <td class="edit-cell">—</td>
    <td class="edit-cell"><button class="btn btn-save" onclick="salvarAlerta()">Salvar</button> <button class="btn" onclick="cancelEdit('a')">Cancelar</button></td>

      ${editState.aId==='new'?editRow:''}
      ${sorted.map(a=>{const v=state.veiculos.find(x=>x.id===a.veiculo_id);const st=stAlerta(a.vencimento);return`<tr><td>${v?.placa||'—'} — ${v?.modelo||''}</td><td><b>${a.tipo}</b></td><td>${a.vencimento}</td><td>${badge(st.label==='Vencido'?'Vencido':'Em '+st.label,st.color,st.bg)}</td><td><button class="btn" style="color:#E24B4A;border-color:#E24B4A" onclick="removerAlerta('${a.id}')">Remover</button></td></tr>`;}).join('')}
    </tbody></table>
  </div>`;}
function renderOrcamento(gc,pc,tg,tp,to){
  const osPendentes=osAbertasDoMes();
  return`
  <div class="card" style="background:#E6F1FB;border-color:#185FA540;padding:0.8rem 1.25rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:13px;font-weight:500;color:#185FA5">📅 Orçamento de: <b style="text-transform:capitalize">${nomeMes(state.mesSelecionado)}</b></span>
    ${osPendentes.length>0?`<span style="margin-left:auto;font-size:12px;color:#BA7517;font-weight:500">⚠️ ${osPendentes.length} OS abertas — previsto: ${fmt(tp)}</span>`:''}
  </div>
  <div class="card"><div class="sec-title">Orçamento por categoria — ${nomeMes(state.mesSelecionado)}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px">
      ${CATEGORIAS.map(cat=>{const real=gc[cat.id]||0,prev=pc[cat.id]||0,orc=Number(state.orcamentos[cat.id]||0);return`
        <div style="border:1px solid ${cat.color}40;border-radius:10px;padding:1rem">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
            <span style="width:10px;height:10px;border-radius:2px;background:${cat.color}"></span>
            <b style="font-size:13px">${cat.label}</b>
          </div>
          <div style="font-size:11px;color:#888;margin-bottom:3px">Valor orçado (R$)</div>
          <input type="number" value="${orc}" onchange="salvarOrcamento('${cat.id}',this.value)" style="margin-bottom:8px;width:100%;padding:6px 9px;border-radius:7px;border:1px solid #d0d0cc;font-size:12px">
          ${pbar(real,prev,orc,cat.color)}
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:6px">
            <span>✅ ${fmt(real)} · ⏳ <span style="color:#BA7517">${fmt(prev)}</span></span>
            <span style="color:${orc-real-prev>=0?'#1D9E75':'#E24B4A'}">saldo ${fmt(orc-real-prev)}</span>
          </div>
        </div>`;}).join('')}
    </div>
  </div>
  <div class="card"><div class="sec-title">Resumo — ${nomeMes(state.mesSelecionado)}</div>
    <div class="grid-metrics">
      ${[{l:'Orçamento total',v:fmt(to),c:'#185FA5'},{l:'Total gasto',v:fmt(tg),c:'#E24B4A'},{l:'Saldo disponível',v:fmt(to-tg),c:to-tg>=0?'#1D9E75':'#E24B4A'},{l:'Previsto (abertas)',v:fmt(tp),c:'#BA7517'},{l:'Saldo c/ previsto',v:fmt(to-tg-tp),c:to-tg-tp>=0?'#1D9E75':'#E24B4A'}]
        .map(x=>`<div class="metric"><div class="metric-label">${x.l}</div><div class="metric-value" style="color:${x.c}">${x.v}</div></div>`).join('')}
    </div>
  </div>`;}
window.setTab=(i)=>{state.tab=i;editState={vId:null,vData:{},fId:null,fData:{},osId:null,osData:{},aId:null,aData:{}};render();};
window.setMes=async(m)=>{state.mesSelecionado=m;state.orcamentos={};await loadAll();};
window.setCategoria=(c)=>{state.filtroCategoria=c;render();};
window.updEdit=(type,key,val)=>{if(type==='v')editState.vData[key]=val;else if(type==='f')editState.fData[key]=val;else if(type==='os')editState.osData[key]=val;else if(type==='a')editState.aData[key]=val;};
window.cancelEdit=(type)=>{if(type==='v')editState.vId=null;else if(type==='f')editState.fId=null;else if(type==='os')editState.osId=null;else if(type==='a')editState.aId=null;render();};
window.novoVeiculo=()=>{editState.vId='new';editState.vData={placa:'',modelo:'',ano:2024,km:0,responsavel:'',tipo:'Caminhão'};render();};
window.editVeiculo=(id)=>{const v=state.veiculos.find(x=>x.id===id);editState.vId=id;editState.vData={...v};render();};
window.novoForn=()=>{editState.fId='new';editState.fData={nome:'',cnpj:'',contato:'',categoria:'manutencao'};render();};
window.editForn=(id)=>{const f=state.fornecedores.find(x=>x.id===id);editState.fId=id;editState.fData={...f};render();};
window.novaOS=()=>{editState.osId='new';editState.osData={numero:'',veiculo_id:'',fornecedor_id:'',categoria:'manutencao',descricao:'',valor:'',nf:'',conta_orcamentaria:'',data_abertura:'',data_fechamento:'',status:'Aberta'};render();};
window.editOS=(id)=>{const o=state.os.find(x=>x.id===id);editState.osId=id;editState.osData={...o};render();};
window.novoAlerta=()=>{editState.aId='new';editState.aData={veiculo_id:state.veiculos[0]?.id||'',tipo:'IPVA',vencimento:''};render();};
window.salvarVeiculo=salvarVeiculo;
window.salvarForn=salvarForn;
window.salvarOS=salvarOS;
window.salvarAlerta=salvarAlerta;
window.removerAlerta=removerAlerta;
window.salvarOrcamento=salvarOrcamento;
loadAll();
</script>
