<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FleetCommand — Gestão de Frotas</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23185FA5'/><text y='72' x='50' text-anchor='middle' font-size='60'>🚛</text></svg>">
  <meta name="theme-color" content="#185FA5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FleetCommand">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
    input,select,button{font-family:inherit}
    input,select{padding:6px 9px;border-radius:7px;border:1px solid #d0d0cc;font-size:12px;background:#fff;color:#1a1a1a;width:100%}
    input:focus,select:focus{outline:2px solid #185FA5;outline-offset:1px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{text-align:left;padding:8px;background:#f5f5f3;border-bottom:1px solid #e0e0da;color:#666;font-size:11px;font-weight:500;white-space:nowrap}
    td{padding:8px;border-bottom:1px solid #ebebea;vertical-align:middle}
    td.ec{padding:4px;background:#eef4fb;vertical-align:middle}
    .btn{padding:6px 13px;border-radius:7px;cursor:pointer;font-size:12px;border:1px solid #d0d0cc;background:transparent;color:#1a1a1a}
    .btn-p{background:#185FA5;color:#fff;border-color:#185FA5}
    .btn-s{background:#1D9E75;color:#fff;border-color:#1D9E75}
    .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500}
    .card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1rem 1.25rem;margin-bottom:14px}
    .metric{background:#f5f5f3;border-radius:8px;padding:.8rem 1rem}
    .toast{position:fixed;bottom:24px;right:24px;background:#1D9E75;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;display:none}
    .toast.err{background:#E24B4A}
    .spin{display:inline-block;width:28px;height:28px;border:3px solid #185FA5;border-top-color:transparent;border-radius:50%;animation:sp .6s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .ox{overflow-x:auto}
    @media(max-width:700px){.g2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="app" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px">
  <div class="spin"></div>
  <span style="color:#666;font-size:13px">Conectando ao banco de dados...</span>
</div>
<div class="toast" id="toast"></div>
<script>
const SURL='https://jrmocioibhnxfrjkoxnh.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpybW9jaW9pYmhueGZyamtveG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjY1ODMsImV4cCI6MjA5MTk0MjU4M30.3tlIaNX2bmvSnzZYiWmLYrpfZ6WpBNauK_xFjAlN56k';
const sb=supabase.createClient(SURL,SKEY);

const CATS=[
  {id:'combustivel',label:'Combustível',color:'#E24B4A',bg:'#FCEBEB'},
  {id:'manutencao',label:'Manutenção Frota',color:'#185FA5',bg:'#E6F1FB'},
  {id:'lavagem',label:'Lavagem',color:'#1D9E75',bg:'#E1F5EE'},
  {id:'pneu_aquisicao',label:'Pneus Aquisição',color:'#BA7517',bg:'#FAEEDA'},
  {id:'pneu_servico',label:'Pneus Serviços',color:'#533CB7',bg:'#EEEDFE'},
  {id:'padronizacao',label:'Padronização Frota',color:'#5F5E5A',bg:'#F1EFE8'},
];
const TIPOS=['Caminhão','Van','Carro','Moto','Utilitário'];
const ATIPS=['IPVA','Seguro','Revisão','CNH','Licenciamento','Cronotacógrafo','ANTT','Despoluir','Laudo Plataforma','Alinhamento','Outros'];
const TABS=[{l:'Painel Geral',i:'▦'},{l:'Veículos',i:'🚛'},{l:'Ordens de Serviço',i:'📋'},{l:'Fornecedores',i:'🏭'},{l:'Alertas',i:'🔔'},{l:'Orçamento',i:'💰'}];

let S={veiculos:[],fornecedores:[],os:[],alertas:[],orc:{},tab:0,mes:new Date().toISOString().substring(0,7),cat:''};
let E={vId:null,vD:{},fId:null,fD:{},osId:null,osD:{},aId:null,aD:{}};

const fmt=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=(a,b)=>b>0?Math.round((a/b)*100):0;
const nomeMes=m=>{const[y,mo]=m.split('-');return new Date(y,mo-1,1).toLocaleString('pt-BR',{month:'long',year:'numeric'});};
const badge=(t,c,bg)=>`<span class="badge" style="color:${c};background:${bg}">${t}</span>`;
const showToast=(m,e=false)=>{const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' err':'');t.style.display='block';setTimeout(()=>t.style.display='none',3000);};

// ================================================================
// LÓGICA DE ORÇAMENTO — REGRA ABSOLUTA:
// Consome orçamento: status='Fechada' E mes_referencia = mes selecionado
// NÃO usa data_abertura nem data_fechamento para cálculo de orçamento
// OS Aberta = previsto (aparece em todos os meses)
// ================================================================
const osRealizadas=()=>S.os.filter(o=>o.status==='Fechada'&&o.mes_referencia===S.mes);
const osPrevistas=()=>S.os.filter(o=>o.status==='Aberta');
const osRealizFilt=()=>S.cat?osRealizadas().filter(o=>o.categoria===S.cat):osRealizadas();
const osPrevissFilt=()=>S.cat?osPrevistas().filter(o=>o.categoria===S.cat):osPrevistas();

const calcGastos=(lista,campo)=>{
  const g={};
  [...S.veiculos.map(v=>v.id),...S.fornecedores.map(f=>f.id),...CATS.map(c=>c.id)].forEach(id=>g[id]=0);
  lista.forEach(o=>{if(g[o[campo]]!==undefined)g[o[campo]]+=Number(o.valor);});
  return g;
};

const gastosCat=()=>calcGastos(osRealizFilt(),'categoria');
const previstoCat=()=>calcGastos(osPrevissFilt(),'categoria');
const gastosV=()=>calcGastos(osRealizFilt(),'veiculo_id');
const previstosV=()=>calcGastos(osPrevissFilt(),'veiculo_id');
const gastosF=()=>calcGastos(osRealizFilt(),'fornecedor_id');
const previstosF=()=>calcGastos(osPrevissFilt(),'fornecedor_id');
const totalGasto=()=>CATS.reduce((s,c)=>s+(gastosCat()[c.id]||0),0);
const totalPrevisto=()=>CATS.reduce((s,c)=>s+(previstoCat()[c.id]||0),0);
const orcAtual=()=>S.cat?{[S.cat]:S.orc[S.cat]||0}:S.orc;
const totalOrc=()=>Object.values(orcAtual()).reduce((a,b)=>a+Number(b),0);

async function loadAll(){
  const[v,f,o,a,orc]=await Promise.all([
    sb.from('veiculos').select('*').order('criado_em'),
    sb.from('fornecedores').select('*').order('criado_em'),
    sb.from('ordens_servico').select('*').order('criado_em'),
    sb.from('alertas').select('*').order('vencimento'),
    sb.from('orcamentos').select('*').eq('mes_ano',S.mes),
  ]);
  S.veiculos=v.data||[];S.fornecedores=f.data||[];S.os=o.data||[];S.alertas=a.data||[];
  S.orc={};(orc.data||[]).forEach(x=>S.orc[x.categoria]=x.valor);
  render();
}

async function salvarV(){
  const d={...E.vD,km:parseInt(E.vD.km)||0,ano:parseInt(E.vD.ano)||2024};
  if(E.vId==='new'){delete d.id;const{error}=await sb.from('veiculos').insert(d);if(error)return showToast('Erro: '+error.message,true);}
  else{const{error}=await sb.from('veiculos').update(d).eq('id',E.vId);if(error)return showToast('Erro: '+error.message,true);}
  E.vId=null;showToast('Veículo salvo!');await loadAll();
}
async function salvarF(){
  const d={...E.fD};
  if(E.fId==='new'){delete d.id;const{error}=await sb.from('fornecedores').insert(d);if(error)return showToast('Erro: '+error.message,true);}
  else{const{error}=await sb.from('fornecedores').update(d).eq('id',E.fId);if(error)return showToast('Erro: '+error.message,true);}
  E.fId=null;showToast('Fornecedor salvo!');await loadAll();
}
async function salvarOS(){
  const d={...E.osD,valor:parseFloat(E.osD.valor)||0};
  d.data_fechamento=d.data_fechamento&&d.data_fechamento.trim()!==''?d.data_fechamento:null;
  d.data_abertura=d.data_abertura&&d.data_abertura.trim()!==''?d.data_abertura:null;
  if(!d.veiculo_id)return showToast('Selecione um veículo',true);
  if(!d.fornecedor_id)return showToast('Selecione um fornecedor',true);
  if(d.status==='Fechada'&&!d.mes_referencia)return showToast('Selecione o mês de referência!',true);
  if(E.osId==='new'){delete d.id;const{error}=await sb.from('ordens_servico').insert(d);if(error)return showToast('Erro OS: '+error.message,true);}
  else{const{error}=await sb.from('ordens_servico').update(d).eq('id',E.osId);if(error)return showToast('Erro OS: '+error.message,true);}
  E.osId=null;showToast('OS salva!');await loadAll();
}
async function salvarA(){
  const d={...E.aD};delete d.id;
  if(!d.veiculo_id||!d.vencimento)return showToast('Preencha veículo e vencimento',true);
  const{error}=await sb.from('alertas').insert(d);
  if(error)return showToast('Erro: '+error.message,true);
  E.aId=null;showToast('Alerta salvo!');await loadAll();
}
async function removerAlerta(id){await sb.from('alertas').delete().eq('id',id);showToast('Removido');await loadAll();}
async function salvarOrc(cat,val){
  const valor=parseFloat(val)||0;
  const{error}=await sb.from('orcamentos').upsert({categoria:cat,mes_ano:S.mes,valor,atualizado_em:new Date().toISOString()},{onConflict:'categoria,mes_ano'});
  if(error)return showToast('Erro: '+error.message,true);
  S.orc[cat]=valor;render();showToast('Orçamento salvo!');
}

function pbar(real,prev,orc,color){
  const pr=Math.min(pct(real,orc),100),pp=Math.min(pct(prev,orc),100-pr);
  const c=pct(real+prev,orc)>100?'#E24B4A':pct(real+prev,orc)>80?'#BA7517':color;
  return `<div style="height:10px;border-radius:4px;background:#ebebea;overflow:hidden;position:relative;margin:3px 0 2px">
    <div style="position:absolute;height:100%;width:${pr}%;background:${c};z-index:2"></div>
    <div style="position:absolute;height:100%;left:${pr}%;width:${pp}%;background:${c}55;z-index:1"></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:#888">
    <span><b style="color:#E24B4A">${fmt(real)}</b>${prev>0?` + <span style='color:#BA7517'>${fmt(prev)} prev.</span>`:''}</span>
    <span>${pct(real+prev,orc)}% de ${fmt(orc)}</span>
  </div>`;
}

function stAlerta(d){
  const dias=Math.ceil((new Date(d+'T00:00:00')-new Date().setHours(0,0,0,0))/86400000);
  if(dias<0)return{l:'Vencido',c:'#E24B4A',bg:'#FCEBEB'};
  if(dias<=30)return{l:dias+'d',c:'#BA7517',bg:'#FAEEDA'};
  return{l:dias+'d',c:'#1D9E75',bg:'#E1F5EE'};
}

function mesOpts(sel){
  const hoje=new Date();let opts=`<option value="">-- Mês de referência --</option>`;
  for(let i=-6;i<=6;i++){
    const d=new Date(hoje.getFullYear(),hoje.getMonth()+i,1);
    const v=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    opts+=`<option value="${v}"${v===sel?' selected':''}>${nomeMes(v)}</option>`;
  }
  return opts;
}

function render(){
  const gc=gastosCat(),gv=gastosV(),gf=gastosF();
  const pc=previstoCat(),pv=previstosV(),pf=previstosF();
  const tg=totalGasto(),tp=totalPrevisto(),to=totalOrc();
  const catsExibir=S.cat?CATS.filter(c=>c.id===S.cat):CATS;

  const tabBtns=TABS.map((t,i)=>`<button onclick="setTab(${i})" style="display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:${S.tab===i?500:400};background:${S.tab===i?'#185FA5':'transparent'};color:${S.tab===i?'#fff':'#888'}">${t.i} ${t.l}</button>`).join('');

  const catBtns=`<button onclick="setCat('')" style="padding:5px 11px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:${S.cat===''?500:400};border:${S.cat===''?'none':'1px solid #d0d0cc'};background:${S.cat===''?'#185FA5':'transparent'};color:${S.cat===''?'#fff':'#1a1a1a'}">Todos</button>`+
    CATS.map(c=>`<button onclick="setCat('${c.id}')" style="display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:${S.cat===c.id?500:400};border:${S.cat===c.id?'none':'1px solid #d0d0cc'};background:${S.cat===c.id?c.color:'transparent'};color:${S.cat===c.id?'#fff':'#1a1a1a'}"><span style="width:8px;height:8px;border-radius:2px;background:${S.cat===c.id?'#fff':c.color}"></span>${c.label}</button>`).join('');

  const filtroBar=`<div class="card" style="padding:.8rem 1.25rem;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:500;color:#666">📅 Mês:</span>
      <input type="month" value="${S.mes}" onchange="setMes(this.value)" style="width:155px;font-weight:500;color:#185FA5;border-color:#185FA5">
      <span style="font-size:12px;font-weight:500;color:#185FA5;text-transform:capitalize">${nomeMes(S.mes)}</span>
    </div>
    ${S.tab===0?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ebebea">
      <span style="font-size:12px;font-weight:500;color:#666">📊 Categoria:</span>
      ${catBtns}
      <span style="margin-left:auto;font-size:11px;color:#888">${osRealizFilt().length} realizadas · <span style="color:#BA7517">${osPrevissFilt().length} previstas</span></span>
    </div>`:''}
  </div>`;

  let content='';
  if(S.tab===0){
    const veicSort=[...S.veiculos].sort((a,b)=>((gv[b.id]||0)+(pv[b.id]||0))-((gv[a.id]||0)+(pv[a.id]||0)));
    const fornSort=[...S.fornecedores].sort((a,b)=>((gf[b.id]||0)+(pf[b.id]||0))-((gf[a.id]||0)+(pf[a.id]||0)));
    const osList=[...osRealizFilt()].sort((a,b)=>b.valor-a.valor).slice(0,6);
    content=`
    ${S.cat?`<div class="card" style="background:${CATS.find(c=>c.id===S.cat)?.bg};border-color:${CATS.find(c=>c.id===S.cat)?.color}60;padding:.7rem 1.25rem;display:flex;align-items:center;gap:10px">
      <b style="color:${CATS.find(c=>c.id===S.cat)?.color}">${CATS.find(c=>c.id===S.cat)?.label}</b>
      <button class="btn" onclick="setCat('')" style="margin-left:auto;font-size:11px">✕ Ver todos</button>
    </div>`:''}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px">
      ${[{l:'Total gasto',v:fmt(tg),c:'#E24B4A'},{l:'Orçamento do mês',v:fmt(to),c:'#185FA5'},{l:'Saldo disponível',v:fmt(to-tg),c:to-tg>=0?'#1D9E75':'#E24B4A'},{l:'OS abertas',v:osPrevissFilt().length,c:'#BA7517'},{l:'Frota',v:S.veiculos.length+' veículos',c:'#1a1a1a'}]
        .map(x=>`<div class="metric"><div style="font-size:11px;color:#666;margin-bottom:3px">${x.l}</div><div style="font-size:20px;font-weight:500;color:${x.c}">${x.v}</div></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" class="g2">
      <div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:12px">Orçamento por categoria</div>
        ${catsExibir.map(cat=>`<div style="margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
            <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:${cat.color};display:inline-block"></span>${cat.label}</span>
          </div>
          ${pbar(gc[cat.id]||0,pc[cat.id]||0,Number(S.orc[cat.id]||0),cat.color)}
        </div>`).join('')}
        <div style="display:flex;gap:12px;font-size:10px;color:#888;margin-top:8px">
          <span><span style="display:inline-block;width:10px;height:10px;background:#185FA5;border-radius:2px;margin-right:3px"></span>Realizado</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#185FA555;border-radius:2px;margin-right:3px"></span>Previsto</span>
        </div>
      </div>
      <div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:12px">Impacto por veículo</div>
        ${veicSort.map((v,i)=>{const r=gv[v.id]||0,p=pv[v.id]||0,tot=tg+tp||1;return`<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:1px">
            <span><b style="color:${i===0?'#E24B4A':'#888'}">#${i+1}</b> ${v.placa} — ${v.modelo}</span>
            <span><b style="color:#E24B4A">${fmt(r)}</b>${p>0?`<span style="color:#BA7517;font-size:11px"> +${fmt(p)}</span>`:''}</span>
          </div>
          <div style="height:7px;border-radius:4px;background:#ebebea;overflow:hidden;position:relative">
            <div style="position:absolute;height:100%;width:${pct(r,tot)}%;background:${i===0?'#E24B4A':'#185FA5'}"></div>
            ${p>0?`<div style="position:absolute;height:100%;left:${pct(r,tot)}%;width:${pct(p,tot)}%;background:${i===0?'#E24B4A55':'#185FA555'}"></div>`:''}
          </div>
        </div>`;}).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" class="g2">
      <div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:12px">Fornecedores por impacto</div>
        <table><thead><tr><th>#</th><th>Fornecedor</th><th>Realizado</th><th>Previsto</th></tr></thead><tbody>
          ${fornSort.map((f,i)=>`<tr><td><b style="color:${i===0?'#E24B4A':'#888'}">${i+1}</b></td><td>${f.nome}</td><td><b style="color:#E24B4A">${fmt(gf[f.id]||0)}</b></td><td style="color:#BA7517">${fmt(pf[f.id]||0)}</td></tr>`).join('')}
        </tbody></table>
      </div>
      <div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:12px">OS mais caras do mês</div>
        <table><thead><tr><th>OS</th><th>Descrição</th><th>Cat.</th><th>Valor</th></tr></thead><tbody>
          ${osList.map(o=>{const cat=CATS.find(c=>c.id===o.categoria);return`<tr><td>${badge(o.numero,'#533CB7','#EEEDFE')}</td><td>${o.descricao||''}</td><td>${badge(cat.label,cat.color,cat.bg)}</td><td><b style="color:#E24B4A">${fmt(o.valor)}</b></td></tr>`;}).join('')}
        </tbody></table>
      </div>
    </div>
    <div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:12px">Alertas de vencimento</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${S.alertas.map(a=>{const v=S.veiculos.find(x=>x.id===a.veiculo_id);const st=stAlerta(a.vencimento);return`<div style="background:${st.bg};border-radius:10px;padding:10px 14px;min-width:140px"><div style="font-size:11px;color:${st.c};font-weight:500">${a.tipo}</div><div style="font-size:13px;font-weight:500">${v?.placa||'—'}</div><div style="font-size:11px;color:#888">${a.vencimento}</div>${badge(st.l==='Vencido'?'Vencido':'Em '+st.l,st.c,'transparent')}</div>`;}).join('')}
      </div>
    </div>`;
  }
  else if(S.tab===1){
    const d=E.vD;
    const eRow=`<tr style="background:#eef4fb">
      <td class="ec"><input autocomplete="off" value="${d.placa||''}" oninput="upd('v','placa',this.value)" placeholder="Placa" style="width:90px"></td>
      <td class="ec"><input autocomplete="off" value="${d.modelo||''}" oninput="upd('v','modelo',this.value)" placeholder="Modelo"></td>
      <td class="ec"><input type="number" value="${d.ano||2024}" oninput="upd('v','ano',this.value)" style="width:65px"></td>
      <td class="ec"><input type="number" value="${d.km||0}" oninput="upd('v','km',this.value)" style="width:80px"></td>
      <td class="ec"><input autocomplete="off" value="${d.responsavel||''}" oninput="upd('v','responsavel',this.value)" placeholder="Responsável"></td>
